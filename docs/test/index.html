<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>Test rendu boutons</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
    header { background: #0b6e2d; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    header h1 { font-size: 22px; font-weight: 700; }
    .status-bar { font-size: 16px; font-weight: 600; }
    #fakeReader { flex: 1; position: relative; background: linear-gradient(135deg, #1a3a2a, #2a1a3a); overflow: hidden; min-height: 0; }
    .tour-progress-banner {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(11, 110, 45, 0.95); color: #fff;
      font-weight: 700; font-size: 16px; padding: 8px 18px; border-radius: 999px;
      z-index: 1001; pointer-events: none;
    }
    .open-list-btn {
      position: absolute; top: 12px; right: 12px;
      height: 42px; padding: 0 16px; border-radius: 999px;
      background: rgba(0,0,0,0.7); border: 1.5px solid rgba(255,255,255,0.5);
      color: #fff; font-size: 15px; font-weight: 700;
      z-index: 1002; min-height: 42px;
      display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
    }
    .open-list-btn svg { width: 20px; height: 20px; }
    .version-tag {
      position: absolute; bottom: 6px; right: 8px;
      color: #fff; font-size: 14px; font-weight: 700;
      background: #dc2626; padding: 4px 10px; border-radius: 4px;
      z-index: 1001; pointer-events: none;
    }
    .scan-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .scan-overlay::before {
      content: ''; width: 75vmin; max-width: 360px; aspect-ratio: 1;
      border: 4px solid rgba(255,255,255,0.8); border-radius: 20px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
    }
    .center-msg {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 30px;
      text-align: center; z-index: 999;
    }
    .center-msg h2 { font-size: 22px; margin-bottom: 12px; }
    .center-msg p { font-size: 16px; line-height: 1.5; color: #ccc; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>Test rendu</h1>
      <span class="status-bar">En ligne ●</span>
    </header>
    <div id="fakeReader">
      <div class="tour-progress-banner">3 / 19 scannées</div>
      <button class="open-list-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        <span>Liste</span>
      </button>
      <div class="scan-overlay"></div>
      <div class="version-tag">TEST RENDU</div>
      <div class="center-msg">
        <h2>Page de test</h2>
        <p>Tu dois voir :<br>
        — en HAUT-CENTRE : pilule verte « 3 / 19 scannées »<br>
        — en HAUT-DROIT : bouton noir « ≡ Liste »<br>
        — en BAS-DROIT : étiquette rouge « TEST RENDU »<br>
        — au CENTRE : cadre blanc</p>
      </div>
    </div>
  </div>
</body>
</html>
